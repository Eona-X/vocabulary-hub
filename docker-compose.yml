# Eona Vocabulary Services — L1/L2/L4 bootstrap
#
# Oxigraph 0.5.8 (RocksDB persistent backend) — per ADR-004 §1.
# Prez 4.23.6 — L4 generated explorer fasttrack — per ADR-005.
#
#   docker compose up -d
#   curl http://localhost:7878/query --data-urlencode 'query=SELECT * WHERE { ?s ?p ?o } LIMIT 1'
#   open http://localhost:8000/

services:
  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:0.5.8
    container_name: eona-oxigraph
    restart: unless-stopped
    ports:
      - "7878:7878"
    command: ["serve", "--location=/data", "--bind=0.0.0.0:7878"]
    volumes:
      - oxigraph-data:/data
    # Healthcheck disabled: oxigraph image is distroless (no /bin/sh, no wget/curl),
    # so CMD-SHELL probes cannot execute. Liveness is verified externally for now
    # (see test plan: curl http://localhost:7878/).
    #
    # TODO: when prod-style monitoring is needed, add a curl sidecar probing the
    # service over the compose network. Sketch:
    #
    #   healthcheck-probe:
    #     image: curlimages/curl:8.10.1
    #     depends_on: [oxigraph]
    #     restart: unless-stopped
    #     entrypoint: ["sh", "-c"]
    #     command:
    #       - |
    #         while true; do
    #           curl -fsS http://oxigraph:7878/ >/dev/null || exit 1
    #           sleep 30
    #         done
    #
    # Or move the probe into the oxigraph service via a healthcheck that targets
    # the sidecar's status, depending on orchestrator capability (K8s readiness
    # probes are the cleaner long-term answer).
    healthcheck:
      disable: true

  # One-shot loader: fetches mobilityDCAT-AP ontology + SHACL shapes from GitHub
  # and PUTs them into fixed Oxigraph named graphs. Idempotent — PUT on the
  # Graph Store Protocol replaces each target graph, so re-runs do not duplicate
  # triples. Exits 0 on success; "restart: no" keeps it from looping.
  loader-mobility-dcat-ap:
    build:
      context: ./pipelines/load-mobility-dcat-ap
    image: eona/loader-mobility-dcat-ap:dev
    container_name: eona-loader-mobility-dcat-ap
    restart: "no"
    depends_on:
      - oxigraph
    environment:
      OXIGRAPH_BASE: "http://oxigraph:7878"
      SOURCE_BASE: "https://raw.githubusercontent.com/Eona-X/mobilityDCAT-AP/HEAD"
      READY_TIMEOUT_S: "120"

  # Prez — read-only Linked Data API + HTML explorer driven by SPARQL + profiles.
  # ADR-005 fasttrack: provides catalog / vocabulary / concept / class pages and
  # HTML/RDF content negotiation out of the box, pointing at Oxigraph.
  #
  # Spike scope: validate §3.5.6 baseline (term access, vocab access, conneg,
  # multilingual labels) before committing to Option E over custom Option D.
  prez:
    image: ghcr.io/rdflib/prez:4.23.6
    container_name: eona-prez
    restart: unless-stopped
    depends_on:
      - oxigraph
    ports:
      - "8000:8000"
    environment:
      SPARQL_REPO_TYPE: "remote"
      SPARQL_ENDPOINT: "http://oxigraph:7878/query"
      # SYSTEM_URI is the externally-visible base for IRIs Prez mints/links.
      # Override in deployment; localhost is fine for the spike.
      SYSTEM_URI: "http://localhost:8000"
      LISTEN_PORT: "8000"
      LOG_LEVEL: "INFO"

volumes:
  oxigraph-data:
